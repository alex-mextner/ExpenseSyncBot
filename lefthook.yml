pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run type-check
    lint:
      run: node_modules/.bin/biome check --no-errors-on-unmatched {staged_files}
      glob: "*.{ts,tsx}"

pre-push:
  commands:
    tests:
      run: find src -path '*/ZenPlugins' -prune -o -name '*.test.ts' -print | xargs bun test
