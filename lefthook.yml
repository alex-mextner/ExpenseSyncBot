pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run type-check
    lint:
      run: node_modules/.bin/biome check --no-errors-on-unmatched {staged_files}
      glob: "*.{ts,tsx}"

pre-push:
  commands:
    tests:
      run: bash -c 'bun test $(find src -name "*.test.ts" -not -path "*/ZenPlugins/*")'
