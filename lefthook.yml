pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run type-check
    lint:
      run: node_modules/.bin/biome check --no-errors-on-unmatched {staged_files}
      glob: "*.{ts,tsx}"

pre-push:
  commands:
    tests:
      run: bun test src/bot src/config src/database src/errors src/services/ai src/services/analytics src/services/bank/*.test.ts src/services/broadcast.test.ts src/services/currency src/services/dev-pipeline src/services/expense-recorder.test.ts src/services/google src/services/receipt src/utils
