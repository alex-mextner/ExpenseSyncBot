name: Deploy to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install
      - run: bun run type-check
      - run: bun run lint
      - name: Run tests
        run: bun run test
      - name: Build Mini App
        run: cd miniapp && bun install --frozen-lockfile && bun run build

  deploy:
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: 104.248.84.190
          username: www-data
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ExpenseSyncBot
            export PATH="/var/www/.nvm/versions/node/v22.17.0/bin:/var/www/.bun/bin:$PATH"

            echo "📥 Pulling latest changes..."
            git remote prune origin
            git pull origin main
            git submodule update --init

            echo "📋 Copying .env.stage into every git worktree..."
            if [ -f .env.stage ]; then
              # Use `git worktree list` instead of a shell glob so branches
              # with slashes (`fix/X`, `feat/X`) — which create nested
              # directories — are iterated correctly. Skip the primary
              # checkout so we don't clobber its .env.
              MAIN_WT="$(pwd)"
              git worktree list --porcelain | awk '/^worktree /{print $2}' | while read -r wt; do
                if [ "$wt" = "$MAIN_WT" ]; then continue; fi
                if [ -d "$wt" ] && [ ! -f "$wt/.env" ]; then
                  cp .env.stage "$wt/.env"
                  echo "  → $wt/.env"
                fi
              done
            fi


            echo "📦 Installing dependencies..."
            /var/www/.bun/bin/bun install

            echo "📦 Installing ZenPlugins dependencies..."
            /var/www/.bun/bin/bun install --cwd src/services/bank/ZenPlugins

            echo "🏗️ Building Mini App..."
            cd miniapp
            /var/www/.bun/bin/bun install --frozen-lockfile
            /var/www/.bun/bin/bun run build
            cd ..

            echo "🔧 Making start script executable..."
            chmod +x start.sh

            echo "📜 Rotating logs before restart..."
            STAMP=$(date +%Y-%m-%d_%H-%M-%S)
            cd logs
            for f in error.log out.log healthcheck.log; do
              if [ -s "$f" ]; then
                mv "$f" "${f%.log}_${STAMP}.log"
                gzip "${f%.log}_${STAMP}.log"
              fi
            done
            cd ..

            echo "🔄 Reloading Caddy..."
            caddy reload --config /etc/caddy/Caddyfile

            echo "📜 Ensuring pm2-logrotate module is installed and configured..."
            if ! /var/www/.bun/bin/pm2 list 2>/dev/null | grep -q pm2-logrotate; then
              /var/www/.bun/bin/pm2 install pm2-logrotate
            fi
            /var/www/.bun/bin/pm2 set pm2-logrotate:max_size 20M
            /var/www/.bun/bin/pm2 set pm2-logrotate:retain 14
            /var/www/.bun/bin/pm2 set pm2-logrotate:compress true
            /var/www/.bun/bin/pm2 set pm2-logrotate:dateFormat YYYY-MM-DD_HH-mm-ss

            echo "🔄 Reloading PM2 process..."
            /var/www/.bun/bin/pm2 reload ecosystem.config.cjs --update-env

            echo "✅ Deployment completed successfully!"

            echo "📊 PM2 status:"
            /var/www/.bun/bin/pm2 list

      - name: Notify deploy success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          TEXT=$(printf '✅ <b>Deployed</b> <code>%s</code>\n%s' "${COMMIT_SHA:0:7}" "$FIRST_LINE")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$ADMIN_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')"

  notify-failure:
    name: Notify on failure
    needs: [check, deploy]
    if: always() && (needs.check.result == 'failure' || needs.deploy.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          TEXT=$(printf '❌ <b>Deploy failed</b> <code>%s</code>\n%s\n\n<a href="%s">View run</a>' "${COMMIT_SHA:0:7}" "$FIRST_LINE" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$ADMIN_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')"
