name: Deploy to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: 104.248.84.190
          username: www-data
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ExpenseSyncBot

            export PATH="/var/www/.nvm/versions/node/v22.17.0/bin:/var/www/.bun/bin:$PATH"

            echo "📥 Pulling latest changes..."
            git remote prune origin
            git pull origin main
            git submodule update --init

            echo "📦 Installing dependencies..."
            /var/www/.bun/bin/bun install

            echo "📦 Installing ZenPlugins dependencies..."
            /var/www/.bun/bin/bun install --cwd src/services/bank/ZenPlugins

            echo "🔧 Making start script executable..."
            chmod +x start.sh

            echo "📜 Rotating logs before restart..."
            STAMP=$(date +%Y-%m-%d_%H-%M-%S)
            cd logs
            for f in error.log out.log healthcheck.log; do
              if [ -s "$f" ]; then
                mv "$f" "${f%.log}_${STAMP}.log"
                gzip "${f%.log}_${STAMP}.log"
              fi
            done
            cd ..

            echo "🔄 Reloading PM2 process..."
            /var/www/.bun/bin/pm2 reload ecosystem.config.cjs --update-env

            echo "✅ Deployment completed successfully!"

            echo "📊 PM2 status:"
            /var/www/.bun/bin/pm2 list

      - name: Notify deploy success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          TEXT=$(printf '✅ <b>Deployed</b> <code>%s</code>\n%s' "${COMMIT_SHA:0:7}" "$FIRST_LINE")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$ADMIN_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML"}')"

  notify-failure:
    name: Notify on failure
    needs: [deploy]
    if: always() && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          TEXT=$(printf '❌ <b>Deploy failed</b> <code>%s</code>\n%s\n\n<a href="%s">View run</a>' "${COMMIT_SHA:0:7}" "$FIRST_LINE" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$ADMIN_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')"
