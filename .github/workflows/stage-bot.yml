name: Stage Bot

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  typecheck:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run type-check

  lint:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run tests
        run: bun test

  stage-bot:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Deploy or stop stage bot
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 104.248.84.190
          username: www-data
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          script: |
            set -e
            export PATH="/var/www/.nvm/versions/node/v22.17.0/bin:/var/www/.bun/bin:$PATH"

            BRANCH="${{ github.head_ref }}"
            WORKTREE="/var/www/ExpenseSyncBot/.claude/worktrees/$BRANCH"
            ENV_FILE="/var/www/ExpenseSyncBot/.env.stage"
            PM2="/var/www/.bun/bin/pm2"
            BUN="/var/www/.bun/bin/bun"

            if [ "${{ github.event.action }}" = "closed" ]; then
              echo "🛑 Stopping stage bot..."
              $PM2 delete expensesyncbot-stage 2>/dev/null || true

              if [ -d "$WORKTREE" ]; then
                cd /var/www/ExpenseSyncBot
                git worktree remove "$WORKTREE" --force 2>/dev/null || true
              fi

              echo "✅ Stage bot stopped"
              exit 0
            fi

            echo "🚀 Deploying stage bot from branch: $BRANCH"

            cd /var/www/ExpenseSyncBot
            git fetch origin

            if [ ! -d "$WORKTREE" ]; then
              echo "📁 Creating worktree..."
              git worktree add "$WORKTREE" "origin/$BRANCH"
            else
              echo "🔄 Updating worktree..."
              cd "$WORKTREE"
              git fetch origin
              git reset --hard "origin/$BRANCH"
            fi

            cd "$WORKTREE"
            $BUN install

            $PM2 delete expensesyncbot-stage 2>/dev/null || true
            $PM2 start index.ts \
                 --name expensesyncbot-stage \
                 --interpreter $BUN \
                 --cwd "$WORKTREE" \
                 -- --env-file $ENV_FILE

            echo "✅ Stage bot deployed"
            $PM2 list

      - name: Comment on PR with stage bot link
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- stage-bot-comment -->';
            const body = `${marker}\n🤖 **Stage bot deployed!** Test it: https://t.me/ExpenseSyncStageBot\n\nBranch: \`${{ github.head_ref }}\` @ \`${context.sha.slice(0, 7)}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment PR closed
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- stage-bot-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n🛑 Stage bot stopped. PR closed.`,
              });
            }
