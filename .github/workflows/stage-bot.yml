name: Stage Bot

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  typecheck:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run type-check

  lint:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run tests
        run: bun run test

  stage-bot:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Deploy or stop stage bot
        id: deploy
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_EVENT_ACTION: ${{ github.event.action }}
        with:
          host: 104.248.84.190
          username: www-data
          key: ${{ secrets.DIGITAL_OCEAN_SSH_KEY }}
          envs: ADMIN_CHAT_ID,REPO,PR_NUMBER,PR_TITLE,GH_EVENT_ACTION
          script: |
            set -e
            export PATH="/var/www/.nvm/versions/node/v22.17.0/bin:/var/www/.bun/bin:$PATH"

            BRANCH="${{ github.head_ref }}"
            MAIN_DIR="/var/www/ExpenseSyncBot"
            WORKTREE="$MAIN_DIR/.claude/worktrees/$BRANCH"
            STAGE_CWD="/var/www/ExpenseSyncBot-stage"
            STAGE_ENV="$MAIN_DIR/.env.stage"
            PM2="/var/www/.bun/bin/pm2"
            BUN="/var/www/.bun/bin/bun"

            # Merge prod .env + stage overrides into STAGE_CWD/.env, then
            # start bun with --no-env-file --env-file pointing at the merged
            # result. This avoids bun's auto-load from package.json directory.
            start_stage_bot() {
              local code_dir="$1"
              mkdir -p "$STAGE_CWD/data"
              cat "$MAIN_DIR/.env" "$STAGE_ENV" | grep -v "^#" | grep -v "^$" | \
                awk -F= '{keys[$1]=$0} END {for(k in keys) print keys[k]}' > "$STAGE_CWD/.env"
              echo "Merged env → $STAGE_CWD/.env ($(wc -l < "$STAGE_CWD/.env") vars)"

              $PM2 delete expensesyncbot-stage 2>/dev/null || true
              $PM2 start "$BUN --no-env-file --env-file=$STAGE_CWD/.env $code_dir/index.ts" \
                   --name expensesyncbot-stage \
                   --cwd "$STAGE_CWD"

              sleep 3
              STATUS=$($PM2 jlist | $BUN -e "
                const procs = JSON.parse(await Bun.stdin.text());
                const p = procs.find(p => p.name === 'expensesyncbot-stage');
                console.log(p?.pm2_env?.status ?? 'not_found');
              ")

              if [ "$STATUS" != "online" ]; then
                echo "❌ Stage bot failed to start (status: $STATUS)"
                echo ""
                echo "=== Last 80 lines of logs ==="
                $PM2 logs expensesyncbot-stage --lines 80 --nostream 2>&1 || true
                return 1
              fi

              echo "✅ Stage bot online (cwd: $cwd)"
            }

            # HTML-escape the three characters Telegram's HTML parse mode
            # rejects inside free text.
            escape_html() {
              printf '%s' "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'
            }

            # Announce "stage bot now runs PR #N" or "stage bot now runs
            # main commit abc1234" via curl to the Telegram Bot API, using
            # the stage bot's own token (read from .env.stage). Mirrors the
            # "Notify deploy success" step in deploy.yml.
            send_startup_notification() {
              local cwd="$1"
              local mode="$2"  # "pr" or "main"

              local commit_sha
              commit_sha=$(cd "$cwd" && git rev-parse HEAD)
              local commit_msg
              commit_msg=$(cd "$cwd" && git log -1 --format='%s')
              local short_sha="${commit_sha:0:7}"

              local stage_bot_token
              stage_bot_token=$(grep "^BOT_TOKEN=" "$STAGE_ENV" | cut -d= -f2- | tr -d '"' | tr -d "'")
              if [ -z "$stage_bot_token" ]; then
                echo "⚠️  BOT_TOKEN not found in $STAGE_ENV — skipping announcement"
                return 0
              fi
              if [ -z "${ADMIN_CHAT_ID:-}" ]; then
                echo "⚠️  ADMIN_CHAT_ID not set — skipping announcement"
                return 0
              fi

              local text
              if [ "$mode" = "pr" ]; then
                local title_escaped
                title_escaped=$(escape_html "${PR_TITLE:-}")
                text="🚀 Stage bot running <a href=\"https://github.com/${REPO}/pull/${PR_NUMBER}\">PR #${PR_NUMBER}</a>: ${title_escaped}"
              else
                local msg_escaped
                msg_escaped=$(escape_html "$commit_msg")
                text="🚀 Stage bot running <code>main</code> <a href=\"https://github.com/${REPO}/commit/${commit_sha}\">${short_sha}</a>: ${msg_escaped}"
              fi

              curl -sS -X POST "https://api.telegram.org/bot${stage_bot_token}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg chat_id "$ADMIN_CHAT_ID" --arg text "$text" \
                  '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')" \
                > /dev/null || echo "⚠️  Telegram notification failed (non-fatal)"
            }

            if [ "$GH_EVENT_ACTION" = "closed" ]; then
              echo "🛑 PR closed — tearing down worktree and restarting stage bot from main..."

              if [ -d "$WORKTREE" ]; then
                cd "$MAIN_DIR"
                git worktree remove "$WORKTREE" --force 2>/dev/null || true
              fi

              # Ensure main is up to date before we switch the stage bot to it.
              cd "$MAIN_DIR"
              git fetch origin main
              git pull origin main || true
              $BUN install

              start_stage_bot "$MAIN_DIR"
              send_startup_notification "$MAIN_DIR" "main"
              $PM2 list
              exit 0
            fi

            echo "🚀 Deploying stage bot from branch: $BRANCH"

            cd "$MAIN_DIR"
            git fetch origin

            if [ ! -d "$WORKTREE" ]; then
              echo "📁 Creating worktree..."
              git worktree add "$WORKTREE" "origin/$BRANCH"
            else
              echo "🔄 Updating worktree..."
              cd "$WORKTREE"
              git fetch origin
              git reset --hard "origin/$BRANCH"
            fi

            cd "$WORKTREE"
            $BUN install

            start_stage_bot "$WORKTREE"
            send_startup_notification "$WORKTREE" "pr"
            $PM2 list

      - name: Comment on PR with stage bot link
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- stage-bot-comment -->';
            const body = `${marker}\n🤖 **Stage bot deployed!** Test it: https://t.me/ExpenseSyncStageBot\n\nBranch: \`${{ github.head_ref }}\` @ \`${context.sha.slice(0, 7)}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment PR closed
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- stage-bot-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n🔁 PR closed. Stage bot switched back to \`main\`.`,
              });
            }
